name: Real Data Connector

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  refresh-live-data:
    runs-on: ubuntu-latest
    steps:
      - name: Wake Render backend
        run: |
          curl -fsS https://ops-intelligence-platform.onrender.com/health || exit 1
      - name: Refresh all live-supported industries through backend
        run: |
          curl --fail --silent --show-error -X POST "https://ops-intelligence-platform.onrender.com/fetch-live-data?industry=all"
